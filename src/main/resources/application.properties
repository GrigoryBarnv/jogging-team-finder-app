spring.application.name=jogteams
spring.datasource.url=jdbc:postgresql://localhost:5432/runnerz
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=das
spring.datasource.password=password
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=optional:classpath:no-data.sql
app.mail.from=${APP_MAIL_FROM:no-reply@jogteams.local}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.consumer.group-id=${APP_KAFKA_GROUP_NOTIFICATIONS:runnerz-notification-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.runnerz.kafka.RunJoinRequestedEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.runnerz.kafka
spring.kafka.listener.missing-topics-fatal=false
app.kafka.topic.run-events=${APP_KAFKA_TOPIC_RUN_EVENTS:run-events}
app.kafka.group.notifications=${APP_KAFKA_GROUP_NOTIFICATIONS:runnerz-notification-group}
